services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asset_backend
    environment:
      DEBUG: "false"
      DATABASE_URL: sqlite+aiosqlite:///./data/asset_db.sqlite
      SECRET_KEY: your-secret-key-change-in-production
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - asset_network
    volumes:
      - backend_data:/app/data
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asset_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - asset_network

  db:
    image: postgres:15-alpine
    container_name: asset_db
    profiles: ["infra"]
    environment:
      POSTGRES_USER: assetuser
      POSTGRES_PASSWORD: assetpass123
      POSTGRES_DB: asset_registry
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asset_network

  redis:
    image: redis:7-alpine
    container_name: asset_redis
    profiles: ["infra"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asset_network

  prometheus:
    image: prom/prometheus:latest
    container_name: asset_prometheus
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - asset_network

  grafana:
    image: grafana/grafana:latest
    container_name: asset_grafana
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - asset_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: asset_elasticsearch
    profiles: ["logging"]
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - asset_network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: asset_logstash
    profiles: ["logging"]
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline
      - ./backend/logs:/var/log/app
    depends_on:
      - elasticsearch
    networks:
      - asset_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: asset_kibana
    profiles: ["logging"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - asset_network

volumes:
  backend_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  asset_network:
    driver: bridge
